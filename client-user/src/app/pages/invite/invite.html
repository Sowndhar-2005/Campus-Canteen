<app-top-navbar></app-top-navbar>

<main class="invite-container d-flex">

  <!-- Left Sidebar: Invite List -->
  <aside class="invite-sidebar d-flex flex-column border-end bg-white">

    <!-- Sidebar Header -->
    <div class="p-3 pb-2">
      <div class="d-flex align-items-center justify-content-between mb-3 px-1">
        <h5 class="fw-bold mb-0">Invite</h5>
        <div class="d-flex gap-1">
          <button type="button" class="btn btn-sm btn-light rounded-3 p-1 d-flex align-items-center justify-content-center sidebar-btn"
                  title="Create new group" aria-label="Create new group">
            <i class="bi bi-plus-square fs-6 text-muted"></i>
          </button>
          <button type="button" class="btn btn-sm btn-light rounded-3 p-1 d-flex align-items-center justify-content-center sidebar-btn"
                   title="More options" aria-label="More options">
            <i class="bi bi-three-dots-vertical fs-6 text-muted"></i>
          </button>
        </div>
      </div>

      <!-- Search -->
      <div class="position-relative mb-3">
        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
        <input
          type="text"
          class="form-control bg-light border-0 rounded-3 ps-5 search-input"
          placeholder="Search friends or groups..."
          [ngModel]="searchQuery()"
          (ngModelChange)="searchQuery.set($event)"
        >
      </div>

      <!-- Filter Chips -->
      <div class="d-flex gap-2 pb-2 overflow-auto sidebar-scrollbar-hide">
        <button type="button"
          class="btn btn-sm rounded-pill px-3 fw-bold text-nowrap"
          [class.btn-primary]="activeFilter() === 'all'"
          [class.btn-light]="activeFilter() !== 'all'"
          [class.border]="activeFilter() !== 'all'"
          (click)="activeFilter.set('all')">
          All
        </button>
        <button type="button"
          class="btn btn-sm rounded-pill px-3 fw-medium text-nowrap"
          [class.btn-primary]="activeFilter() === 'unread'"
          [class.btn-light]="activeFilter() !== 'unread'"
          [class.border]="activeFilter() !== 'unread'"
          (click)="activeFilter.set('unread')">
          Unread
        </button>
        <button type="button"
          class="btn btn-sm rounded-pill px-3 fw-medium text-nowrap"
          [class.btn-primary]="activeFilter() === 'groups'"
          [class.btn-light]="activeFilter() !== 'groups'"
          [class.border]="activeFilter() !== 'groups'"
          (click)="activeFilter.set('groups')">
          Groups
        </button>
      </div>
    </div>

    <!-- Chat List / Empty State -->
    <div class="flex-grow-1 overflow-auto d-flex align-items-center justify-content-center text-center p-4">
      <div class="d-flex flex-column align-items-center opacity-50">
        <i class="bi bi-chat-dots fs-1 mb-2"></i>
        <p class="small mb-0 text-muted">No active chats</p>
      </div>
    </div>

    <!-- Sidebar Footer -->
    <div class="p-3 border-top d-flex align-items-center justify-content-between bg-light mt-auto">
      <div class="d-flex align-items-center gap-2">
        <div class="rounded-circle bg-secondary d-flex align-items-center justify-content-center text-white fw-bold initials-avatar">
          {{ getUserInitials() }}
        </div>
        <span class="small fw-bold">My Status</span>
      </div>
      <div>
        <button type="button" class="btn btn-sm btn-light rounded-circle p-1 d-flex align-items-center justify-content-center sidebar-btn"
                title="Settings" aria-label="Settings">
          <i class="bi bi-gear text-muted"></i>
        </button>
      </div>
    </div>
  </aside>

  <!-- Right Panel: Conversation Area -->
  <section class="flex-grow-1 d-flex flex-column position-relative conversation-panel">
    <!-- Dotted background pattern -->
    <div class="dotted-bg"></div>

    <!-- Empty State -->
    <div class="flex-grow-1 d-flex flex-column align-items-center justify-content-center gap-3 position-relative" style="z-index: 1;">
      <div class="d-flex flex-column align-items-center text-muted">
        <i class="bi bi-chat-square-text display-4 mb-3 opacity-50"></i>
        <p class="fs-6 fw-medium mb-1">Start a new conversation</p>
        <p class="small opacity-75">Invite friends to order food together</p>
      </div>
    </div>
  </section>

</main>
